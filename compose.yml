name: followthru

services:
  postgres:
    image: postgres:16-alpine
    container_name: followthru-postgres
    environment:
      POSTGRES_DB: followthru
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - followthru_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d followthru"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  followthru_postgres_data:
